# M4 L2 — Zajezdnia / The Courier Yard
# An underground courier depot: rows of file-crawlers frozen mid-route, each buried
# under its own private dune of sand sifted through a cracked roof. One unit — E-CH0 —
# is parked at a side hatch, facing the exit as if still waiting for an order. A loading
# annex opens to the south; the service well holds the route journal. Library-quiet.
