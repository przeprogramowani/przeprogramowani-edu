# M2 L3 — Martwy Punkt / The Deadlock
# The great tram junction under the ice roof. Three trams frozen in a triangle of
# mutual blockade; a dispatcher substation in the middle; ore spilled on the rails.
theme: 3
grid: |
  ~~~#######~~~~~~~~~~~~~~~~~~~~~~
  ~~~#.....#~~~~~~~~~~~~~~~~~~~~~~
  ~~~#.....#~~~~~~~~~~~~~~~~~~~~~~
  ~~~###.###~~~~~~~~~~~~~~~~~~~~~~
  ######.#########################
  #..............................#
  #..............................#
  D..............................D
  #..............................#
  #..............................#
  #..............................#
  #######################.########
  ~~~~~~~~~~~~~~~~~~~~###.####~~~~
  ~~~~~~~~~~~~~~~~~~~~#......#~~~~
  ~~~~~~~~~~~~~~~~~~~~#......#~~~~
  ~~~~~~~~~~~~~~~~~~~~########~~~~
props:
  - { id: track-board, prop: holo-plan-board, at: [4, 5], solid: true }
  - { id: tram-alpha, prop: cargo-tram, at: [10, 6], solid: true }
  - { id: tram-beta, prop: cargo-tram, at: [15, 6], solid: true }
  - { id: tram-gamma, prop: cargo-tram, at: [20, 6], solid: true }
  - { prop: synaptit-ore, at: [17, 7], solid: false }
  - { prop: synaptit-ore, at: [18, 7], solid: false }
  - { prop: synaptit-ore, at: [21, 7], solid: false }
  - { prop: synaptit-ore, at: [22, 8], solid: false }
  - { id: dispatch-substation, prop: frozen-console, at: [12, 9], solid: true }
  - { id: cert-terminal, prop: frozen-console, at: [28, 9], solid: true }
zones:
