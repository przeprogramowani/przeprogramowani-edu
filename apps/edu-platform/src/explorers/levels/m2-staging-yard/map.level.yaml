    name: Return to the Service Bay
    type: door
    at: [0, 7]
    properties:
      targetMap: m2-drafting-hall
      spawnX: 24
      spawnY: 7
  - id: foundry-door
    name: Route to the Foundry
    type: door
    at: [31, 7]
    properties:
      targetMap: m2-assembly-line
      spawnX: 1
      spawnY: 3
      requiredFlags: m2-deadlock-cleared
  - id: dispatch-substation
    name: Dispatcher Substation
    type: trigger
    propId: dispatch-substation
  - id: tram-gamma
    name: Tram Gamma (Frozen Mid-Move)
    type: trigger
    propId: tram-gamma
  - id: tram-beta
    name: Tram Beta (Frozen Mid-Move)
    type: trigger
    propId: tram-beta
  - id: tram-alpha
    name: Tram Alpha (Frozen Mid-Move)
    type: trigger
    propId: tram-alpha
  - id: track-board
    name: Track-State Board
    type: trigger
    propId: track-board
  - id: ore-spill
    name: Spilled Ore on the Rails
    type: trigger
    at: [18, 7]
  - id: sopel
    name: Sopel
    type: npc
    at: [13, 8]
    properties:
      npcType: robot
      npcVariant: frosty-blue
  - id: exam-protocol-8
    name: Expedition Protocol Terminal VIII
    type: exam
