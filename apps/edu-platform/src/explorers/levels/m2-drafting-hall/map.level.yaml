    name: Return to the Staging Yard
    type: door
    at: [0, 7]
    size: [1, 2]
    properties:
      targetMap: m2-staging-yard
      spawnX: 30
      spawnY: 7
  - id: drafting-table-1
    name: Frozen Drafting Table
    type: trigger
    propId: drafting-table-1
  - id: drafting-table-2
    name: Frozen Drafting Table (South Bay)
    type: trigger
    propId: drafting-table-2
  - id: model-plinth
    name: Belt Operation Scale Model
    type: trigger
    propId: model-plinth
  - id: approach-array
    name: Approach-Control Array
    type: trigger
    propId: approach-array
  - id: architecture-console
    name: Architecture Console
    type: trigger
    propId: architecture-console
  - id: exam-agent-architecture
    name: VOID Certification Terminal
    type: exam
    propId: cert-terminal
    properties:
      examId: m2-exam-agent-architecture
  - id: draftsman-a3
    name: Draftsman A-3
    type: npc
    at: [9, 8]
    properties:
      npcType: robot
      npcVariant: hologram-blue
  - id: assembly-line-door
    name: Route to the Assembly Hall
    type: door
    at: [25, 7]
