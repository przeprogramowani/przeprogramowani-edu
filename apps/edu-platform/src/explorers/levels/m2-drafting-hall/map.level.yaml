# M2 L3 — The Drafting Hall (Kreślarnia)
# Drafting bays broken by two offset wall blocks (S-shaped sightlines);
# model plinth landmark mid-hall, approach-control array alcove north-east,
# architecture console south-east.
theme: 3
grid: |
  ~~~~~~~~~~~~~~~~~~#######~
  ~~~~~~~~~~~~~~~~~~#.....#~
  ~~~~~~~~~~~~~~~~~~###.###~
  #####################.####
  #.....##.................#
  #.....##.................#
  #.....##.................#
  D.....##.................D
  D.............##.........D
  #.............##.........#
  #.............##.........#
  #.............##.........#
  ##########################
props:
  - { id: approach-array, prop: scout-drone, at: [19, 1], solid: true }
  - { id: cert-terminal, prop: ice-crystals, at: [23, 4], solid: true }
  - { id: drafting-table-1, prop: expedition-tent, at: [3, 5], solid: true }
  - { id: model-plinth, prop: ice-crystals, at: [10, 6], solid: true }
  - { id: drafting-table-2, prop: expedition-tent, at: [2, 9], solid: true }
  - { id: blueprint-frost, prop: yeti-footsteps, at: [11, 9], solid: false }
  - { id: architecture-console, prop: energy-barrier, at: [20, 10], solid: true }
zones:
