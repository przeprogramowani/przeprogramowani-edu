# M4 L4 — Skarbiec Map / The Map Vault
# An underground canyon of shelving: shelves like rock walls, catwalks and lifts over
# a chasm of files, sand cones on the floor. Three geological bays stand off the north
# ridge; the east chimney wing glitters with Synaptit veins behind collapsed galleries;
# the south apse holds the survey head and the Cartograph console. From here the first
# Master Deposit Map is compiled — cargo that weighs less than it means.
