  #######..#########
  #................#
  #................#
  #................#
  D................#
  #................#
  #................#
  #................#
  #####....#########
  ~~~~#....#~~~~~~~~
  ~~~~#....#~~~~~~~~
  ~~~~######~~~~~~~~
