# M4 L5 — Bank Pamięci / The Memory Vault
# The archive's deepest chamber: the Memory Well — a shaft down into the dark of the
# banks and a shaft up toward the surface mast. Empty core cradles stand like a
# honeycomb; behind a seal waits the backup crypt. The first place on the moon where
# the sand cannot be heard — the absolute silence of a vault. Only Echo waits at the
# approach.
