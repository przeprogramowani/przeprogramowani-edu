# M3 L3 — Próba Ognia / The Fire Trial
# A formal test range under open sky: a north control gallery overlooks three test
# bays set in a dead-straight row, each a stand planted over a lava nozzle. Under
# stand 3 the trench splits open on the moon's first exposed Synaptit vein. Everything
# here is square, ordered, symmetric — the range that passed every trial and checked nothing.
