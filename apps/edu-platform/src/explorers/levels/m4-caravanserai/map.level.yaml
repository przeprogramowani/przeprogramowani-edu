# M4 L1 — Karawanseraj / The Caravanserai
# A sea of dunes with only the tips of masts and a line of stone cairns showing.
# The shuttle sits on a beaten apron to the west; the survey camp and its reading
# well stand under the tilted mast; three road-cairns mark the outskirts (two true,
# one moved); the buried main hatch waits under the sand to the east. Twilight the
# colour of old paper. Nothing here lies — everything here is true and buried.
