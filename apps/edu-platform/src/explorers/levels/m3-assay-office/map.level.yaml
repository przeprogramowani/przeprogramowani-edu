# M3 L5 — Izba Probiercza / The Assay Office
# A vault at the caldera's edge. The archive hall holds the whole record of Project
# Odyssey; the assay desk carries the physical stamp; the main dish runs the canary
# track. West is Iskra's approach ledge. East, across a single-tile causeway over the
# rim, stands the lava-obelisk — older than any mission data, never activated, never
# explained. Near-isolation by design.
