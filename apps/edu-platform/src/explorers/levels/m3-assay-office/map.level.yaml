# M3 L5 — Izba Probiercza / The Assay Office
# A caldera-edge vault: archive walls of the whole Project Odyssey, the assay desk
# with its physical stamp, the main dish that runs the canary track, and beyond the
# rim the lava-obelisk — older than any mission data, never activated, never
# explained. Iskra waits at the approach ledge. Near-isolation by design.
