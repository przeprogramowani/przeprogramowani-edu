# M3 L4 — Wyżarzalnia / The Annealing Yard
# Cathedral scale. A long nave runs door to door; three anneal bays stand off the
# north ridge like a vineyard's rows, the dead relay dish rusting in the first of
# them. The whole east wall is a crystal garden — a tall chimney wing veined with
# Synaptit and crowned by a lava-obelisk. The south apse holds the assay rig and the
# cooling-loop fault trace. The first controlled fire of the moon.
