# M3 L1 — Przedpole / The Apron
# A survey clearing carved into the black-glass apron: molten lava on every side,
# three finger-piers reaching out to the audit points (cooling tower NW, telemetry
# mast NE, seismic anchor SE), the shuttle in a west landing bay, and the survey
# camp under the main board. A sea of green readouts over a dead station.
