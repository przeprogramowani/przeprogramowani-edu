# M3 L2 — Złomowisko / The Boneyard
# A wreck field where machines walked into the lava with green lights still blinking.
# Frozen lava streams wind between the hulls — the drivable spine threads bay to bay,
# each pocket holding a scorched rover. The only red light on the whole moon is I-5KRA,
# parked on the safe northeast edge. The service module sits mid-field; Moreau and Kern
# speak only through it. Deliberate isolation by design.
