# M3 L2 — Złomowisko / The Boneyard
# A wreck field of machines that walked into the lava with green lights blinking.
# Frozen lava streams (magma-crystals) wind between the hulls; the only red light
# on the whole moon is I-5KRA, parked on the safe edge. The service module sits
# mid-field. Deliberate isolation — Moreau and Kern speak through the module.
