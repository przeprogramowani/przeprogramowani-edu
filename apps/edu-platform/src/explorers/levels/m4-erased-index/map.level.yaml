# M4 L3 — Wymazany Indeks / The Erased Index
# A cathedral catalogue hall under the largest dune: carousel spindles reaching to the
# roof, catwalks and lifts. Every drawer full, every label clean — the cross-references
# ground to dust, the content untouched. A north niche opens on a Synaptit vein bared in
# a collapsed wall of shelving; a south reading chamber holds the sealed lower stacks.
# Through a cracked skylight a thin thread of sand builds a cone on the floor: the hall's
# own hourglass.
