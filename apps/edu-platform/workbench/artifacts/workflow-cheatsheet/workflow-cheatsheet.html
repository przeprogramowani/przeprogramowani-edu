</head>

        foundation: {

            greenfield: {

          sideBranches: ["/10x-roadmap", "/10x-infra-research", "/10x-test-plan"],

        perChange: {
          start: "/10x-new",
          situationalPrePlan: ["/10x-frame", "/10x-research"], // either/both, optional

          close: "/10x-archive",

    // --- Phase 1 automated check: dataset shape + counts (no console error). ---
    (function verifyDataset() {
      const skillCount = CHEATSHEET.skills.length;
      const promptCount = CHEATSHEET.prompts.length;
      console.assert(skillCount === 23, "expected 23 skills, got " + skillCount);
      console.assert(promptCount === 7, "expected 7 prompts, got " + promptCount);

      // Every skill carries the required fields and a known shape.
      const shapes = Object.keys(CHEATSHEET.shapes);
      for (const s of CHEATSHEET.skills) {
        console.assert(typeof s.command === "string" && s.command.startsWith("/"),
          "skill missing command: " + JSON.stringify(s));
        console.assert(shapes.includes(s.shape),
          "skill has unknown shape: " + s.command + " → " + s.shape);
        for (const field of ["purpose", "whenToUse", "inputArtifact", "outputArtifact", "firstTaught", "module", "lesson"]) {
          console.assert(s[field], "skill " + s.command + " missing field: " + field);
        }
      }

      console.log("cheatsheet dataset OK — " + skillCount + " skills, " + promptCount + " prompts");
    })();

    // Expose for the renderer.
    window.CHEATSHEET = CHEATSHEET;
  </script>

  <script id="cheatsheet-render">
    "use strict";
    (function render() {
      const C = window.CHEATSHEET;
      const app = document.getElementById("app");

      // Presentational-only lesson titles (research.md §2). Not part of the
      // dataset contract — labels for lane sub-headings.
      const LESSON_TITLES = {
        m0l1: "Prework",
        m1l1: "Od pomysłu do PRD",
        m1l2: "Wybór stacku",
        m1l3: "Bootstrap z AI",
        m1l4: "Onboarding agenta",
        m1l5: "Localhost → produkcja",
        m2l1: "Roadmapa MVP",
        m2l2: "Implementacja z agentami",
        m2l3: "Solo code review",
        m2l4: "AI research toolkit",
        m2l5: "Praca wieloagentowa",
        m3l1: "Plan testów z AI",
        m3l2: "Od planu do testów",
        m3l3: "Hooki i triggery",
        m3l4: "Testy E2E",
        m3l5: "Debugging z AI",
      };

      // Shape → Tailwind tint classes (cell + legend swatch), keyed off the
      // three shapes in the dataset.
      const SHAPE_STYLE = {
        generator: { cell: "bg-sky-50 border-sky-300", bar: "bg-sky-400", badge: "bg-sky-100 text-sky-800", swatch: "bg-sky-100 border-sky-300" },
        driver:    { cell: "bg-amber-50 border-amber-300", bar: "bg-amber-400", badge: "bg-amber-100 text-amber-800", swatch: "bg-amber-100 border-amber-300" },
        register:  { cell: "bg-emerald-50 border-emerald-300", bar: "bg-emerald-400", badge: "bg-emerald-100 text-emerald-800", swatch: "bg-emerald-100 border-emerald-300" },
      };

      const el = (tag, cls, html) => {
        const n = document.createElement(tag);
        if (cls) n.className = cls;
        if (html != null) n.innerHTML = html;
        return n;
      };
      const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const shapeByCommand = Object.fromEntries(C.skills.map((s) => [s.command, s.shape]));

      // ---- Header + legend ---------------------------------------------------
      const header = el("header", "mb-8");
      header.appendChild(el("h1", "text-3xl font-bold tracking-tight text-slate-900",
        "10x Workflow — ściąga skilli"));
      header.appendChild(el("p", "mt-2 max-w-3xl text-slate-600",
        "Co robi każdy skill, kiedy po niego sięgnąć i jaki plik czyta → zapisuje. " +
        "Pogrupowane po module (M0→M3); pokazane są tylko skille <em>nowe</em> w danej lekcji. " +
        "Łańcuch na dole pokazuje, jak się spinają w całość."));

      const legend = el("div", "mt-4 flex flex-wrap items-center gap-x-6 gap-y-2 rounded-lg border border-slate-200 bg-white p-3 text-sm");
      legend.appendChild(el("span", "font-semibold text-slate-700", "Kształt skilla:"));
      for (const key of Object.keys(C.shapes)) {
        const s = C.shapes[key];
        const item = el("span", "inline-flex items-center gap-2");
        item.appendChild(el("span", "inline-block h-4 w-4 rounded border " + SHAPE_STYLE[key].swatch));
        item.appendChild(el("span", "text-slate-700", "<strong>" + esc(s.label) + "</strong> — " + esc(s.desc)));
        legend.appendChild(item);
      }
      header.appendChild(legend);
      app.appendChild(header);

      // ---- Module lanes ------------------------------------------------------
      for (const mod of C.modules) {
        const lane = el("section", "mb-8 rounded-xl border border-slate-200 bg-white shadow-sm");
        const band = el("div", "flex items-baseline gap-3 rounded-t-xl border-b border-slate-200 bg-slate-800 px-4 py-3 text-white");
        band.appendChild(el("span", "rounded bg-white/15 px-2 py-0.5 text-sm font-bold", esc(mod.id)));
        band.appendChild(el("span", "text-lg font-semibold", esc(mod.title)));
        band.appendChild(el("span", "text-sm text-slate-300", esc(mod.subtitle)));
        lane.appendChild(band);

        const body = el("div", "p-4");
        const modSkills = C.skills.filter((s) => s.module === mod.id);

        if (modSkills.length === 0) {
          // M0 carries only the prework prompt — no skills.
          const modPrompts = C.prompts.filter((p) => p.module === mod.id);
          const note = el("p", "text-sm text-slate-500");
          note.innerHTML = "Brak skilli — tylko materiały preworku" +
            (modPrompts.length ? " (prompt <span class='mono'>" + esc(modPrompts[0].name) + "</span>)." : ".");
          body.appendChild(note);
        } else {
          // Lessons in first-appearance order (dataset is already in lesson order).
          const lessons = [];
          for (const s of modSkills) if (!lessons.includes(s.lesson)) lessons.push(s.lesson);

          for (const lesson of lessons) {
            const group = el("div", "mb-5 last:mb-0");
            const sub = el("h3", "mb-2 flex items-center gap-2 text-sm font-semibold text-slate-500");
            sub.appendChild(el("span", "mono rounded bg-slate-100 px-1.5 py-0.5 text-slate-700", esc(lesson)));
            sub.appendChild(el("span", "", esc(LESSON_TITLES[lesson] || "")));
            group.appendChild(sub);

            const grid = el("div", "grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-3");
            for (const s of modSkills.filter((x) => x.lesson === lesson)) {
              grid.appendChild(skillCell(s));
            }
            group.appendChild(grid);
            body.appendChild(group);
          }
        }
        lane.appendChild(body);
        app.appendChild(lane);
      }

      function skillCell(s) {
        const st = SHAPE_STYLE[s.shape];
        const cell = el("article", "relative overflow-hidden rounded-lg border " + st.cell + " p-3 pl-4");
        cell.appendChild(el("span", "absolute left-0 top-0 h-full w-1.5 " + st.bar));

        const top = el("div", "flex items-center justify-between gap-2");
        top.appendChild(el("span", "mono text-base font-bold text-slate-900", esc(s.command)));
        top.appendChild(el("span", "rounded px-1.5 py-0.5 text-[11px] font-semibold " + st.badge, esc(C.shapes[s.shape].label)));
        cell.appendChild(top);

        cell.appendChild(el("p", "mt-1.5 text-sm text-slate-700", esc(s.purpose)));

        const when = el("p", "mt-1.5 text-sm text-slate-600");
        when.innerHTML = "<span class='font-semibold text-slate-500'>Kiedy:</span> " + esc(s.whenToUse);
        cell.appendChild(when);

        const io = el("div", "mt-2 rounded bg-white/70 px-2 py-1.5 text-xs");
        io.innerHTML = "<span class='mono text-slate-700'>" + esc(s.inputArtifact) + "</span>" +
          " <span class='arrow'>→</span> " +
          "<span class='mono font-semibold text-slate-900'>" + esc(s.outputArtifact) + "</span>";
        cell.appendChild(io);

        const foot = el("div", "mt-2 flex flex-wrap items-center gap-2 text-[11px]");
        foot.appendChild(el("span", "text-slate-500", "pierwszy raz: <span class='mono font-semibold text-slate-700'>" + esc(s.firstTaught) + "</span>"));
        if (s.note) foot.appendChild(el("span", "rounded bg-slate-200 px-1.5 py-0.5 text-slate-600", esc(s.note)));
        cell.appendChild(foot);

        return cell;
      }

      // ---- Chain strip -------------------------------------------------------
      const chainNode = (cmd, kind) => {
        // kind: undefined (skill, tinted by shape), "gate", "branch"
        const shape = shapeByCommand[cmd];
        let cls = "mono inline-block rounded-md border px-2 py-1 text-xs font-semibold ";
        if (kind === "gate") cls += "border-dashed border-slate-400 bg-white text-slate-700";
        else if (shape && SHAPE_STYLE[shape]) cls += SHAPE_STYLE[shape].cell + " text-slate-900";
        else cls += "border-slate-300 bg-white text-slate-700";
        return el("span", cls, esc(cmd));
      };
      const arrow = () => el("span", "arrow px-0.5", "→");
      const flowRow = () => el("div", "flex flex-wrap items-center gap-1.5");
      const seq = (cmds, kinds) => {
        const row = flowRow();
        cmds.forEach((cmd, i) => {
          if (i) row.appendChild(arrow());
          row.appendChild(chainNode(cmd, kinds && kinds[cmd]));
        });
        return row;
      };

      const chainSec = el("section", "mb-8 rounded-xl border border-slate-200 bg-white p-5 shadow-sm");
      chainSec.appendChild(el("h2", "mb-1 text-xl font-bold text-slate-900", "Jak się to spina (łańcuch)"));
      chainSec.appendChild(el("p", "mb-4 text-sm text-slate-600",
        "Każdy skill czyta plik z poprzedniego kroku i zapisuje wejście dla następnego. " +
        "Skille nie chainują się same — to ty jesteś dyspozytorem."));

      const fnd = C.chain.foundation;
      // Foundation block
      const fBlock = el("div", "mb-5");
      fBlock.appendChild(el("h3", "mb-2 text-sm font-bold uppercase tracking-wide text-slate-500", "Fundament — raz na projekt"));
      const fHead = flowRow();
      fnd.head.forEach((cmd, i) => { if (i) fHead.appendChild(arrow()); fHead.appendChild(chainNode(cmd)); });
      fHead.appendChild(arrow());
      fHead.appendChild(el("span", "text-xs font-semibold text-slate-500", "rozwidlenie:"));
      fBlock.appendChild(fHead);

      const forkWrap = el("div", "mt-2 grid grid-cols-1 gap-2 sm:grid-cols-2");
      for (const key of ["greenfield", "brownfield"]) {
        const fork = fnd.forks[key];
        const box = el("div", "rounded-lg border border-slate-200 bg-slate-50 p-2.5");
        box.appendChild(el("div", "mb-1.5 text-xs font-bold text-slate-600", esc(fork.label)));
        box.appendChild(seq(fork.steps));
        forkWrap.appendChild(box);
      }
      fBlock.appendChild(forkWrap);

      const conv = flowRow();
      conv.className += " mt-2";
      conv.appendChild(el("span", "text-xs font-semibold text-slate-500", "obie gałęzie zbiegają się →"));
      conv.appendChild(chainNode(fnd.convergesAt));
      fBlock.appendChild(conv);

      const side = el("p", "mt-2 text-xs text-slate-500");
      side.innerHTML = "Po PRD (sytuacyjnie, nieliniowo): " +
        fnd.sideBranches.map((c) => "<span class='mono font-semibold text-slate-700'>" + esc(c) + "</span>").join(" · ");
      fBlock.appendChild(side);
      chainSec.appendChild(fBlock);

      // Per-change loop
      const pc = C.chain.perChange;
      const pBlock = el("div", "mb-5 border-t border-slate-200 pt-4");
      pBlock.appendChild(el("h3", "mb-2 text-sm font-bold uppercase tracking-wide text-slate-500", "Pętla per-change — powtarzasz dla każdej zmiany"));

      const loop = flowRow();
      loop.appendChild(chainNode(pc.start));
      loop.appendChild(arrow());
      loop.appendChild(el("span", "rounded-md border border-dashed border-slate-400 bg-white px-2 py-1 text-xs text-slate-600",
        "[ " + pc.situationalPrePlan.map((c) => "<span class='mono font-semibold'>" + esc(c) + "</span>").join(" / ") + " ] — sytuacyjnie"));
      loop.appendChild(arrow());
      loop.appendChild(chainNode(pc.plan));
      loop.appendChild(arrow());
      loop.appendChild(chainNode(pc.planGate, "gate"));
      pBlock.appendChild(loop);

      // Execution siblings box
      const exec = C.chain.perChange.execution;
      const execBox = el("div", "mt-2 rounded-lg border border-amber-300 bg-amber-50 p-3");
      execBox.appendChild(el("div", "mb-2 text-xs font-bold uppercase tracking-wide text-amber-800", "Wykonanie — 3 siostry, przeplatane per fazę"));
      const execRow = el("div", "flex flex-wrap items-center gap-1.5");
      exec.siblings.forEach((cmd, i) => {
        if (i) execRow.appendChild(el("span", "text-amber-500 font-bold", "|"));
        execRow.appendChild(chainNode(cmd));
      });
      execBox.appendChild(execRow);
      const shared = el("p", "mt-2 text-xs text-amber-800");
      shared.innerHTML = "↕ wspólny <span class='mono font-semibold'>" + esc(exec.sharedState) + "</span> — " + esc(exec.note);
      execBox.appendChild(shared);
      pBlock.appendChild(execBox);

      const tail = flowRow();
      tail.className += " mt-2";
      tail.appendChild(el("span", "text-xs font-semibold text-slate-500", "potem →"));
      tail.appendChild(chainNode(pc.implGate, "gate"));
      tail.appendChild(arrow());
      tail.appendChild(chainNode(pc.close));
      pBlock.appendChild(tail);
      chainSec.appendChild(pBlock);

      // Status lifecycle ribbon
      const life = el("div", "border-t border-slate-200 pt-4");
      life.appendChild(el("h3", "mb-2 text-sm font-bold uppercase tracking-wide text-slate-500", "Cykl życia change.md (frontmatter)"));
      const ribbon = flowRow();
      C.chain.statusLifecycle.forEach((st, i) => {
        if (i) ribbon.appendChild(arrow());
        ribbon.appendChild(el("span", "mono rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-600", esc(st)));
      });
      life.appendChild(ribbon);
      chainSec.appendChild(life);
      app.appendChild(chainSec);

      // ---- Prompts footnotes -------------------------------------------------
      const pr = el("section", "mb-8 rounded-xl border border-slate-200 bg-white p-5 shadow-sm");
      pr.appendChild(el("h2", "mb-1 text-xl font-bold text-slate-900", "Prompty (drugorzędne, per lekcja)"));
      pr.appendChild(el("p", "mb-4 text-sm text-slate-600",
        "Prostsze niż skille — jednorazowa eksploracja albo edycja. Cztery <span class='mono'>m1l5-*</span> to jedna 4-krokowa sekwencja deployu."));

      const grouped = {};   // group key -> prompts
      const singles = [];
      for (const p of C.prompts) {
        if (p.group) (grouped[p.group] = grouped[p.group] || []).push(p);
        else singles.push(p);
      }
      const plist = el("div", "grid grid-cols-1 gap-3 sm:grid-cols-2");
      for (const p of singles) {
        const item = el("div", "rounded-lg border border-slate-200 bg-slate-50 p-3");
        const h = el("div", "flex items-center gap-2");
        h.appendChild(el("span", "mono text-sm font-bold text-slate-900", esc(p.name)));
        h.appendChild(el("span", "mono rounded bg-slate-200 px-1 text-[11px] text-slate-600", esc(p.lesson)));
        item.appendChild(h);
        item.appendChild(el("p", "mt-1 text-sm text-slate-600", esc(p.description)));
        plist.appendChild(item);
      }
      for (const key of Object.keys(grouped)) {
        const steps = grouped[key].slice().sort((a, b) => (a.step || 0) - (b.step || 0));
        const item = el("div", "rounded-lg border border-slate-300 bg-slate-50 p-3 sm:col-span-2");
        const h = el("div", "mb-1.5 flex items-center gap-2");
        h.appendChild(el("span", "text-sm font-bold text-slate-900", "Sekwencja deployu"));
        h.appendChild(el("span", "mono rounded bg-slate-200 px-1 text-[11px] text-slate-600", esc(steps[0].lesson)));
        item.appendChild(h);
        const ol = el("ol", "space-y-1");
        for (const p of steps) {
          const li = el("li", "text-sm text-slate-600");
          li.innerHTML = "<span class='mono font-semibold text-slate-800'>" + esc(p.name) + "</span> — " + esc(p.description);
          ol.appendChild(li);
        }
        item.appendChild(ol);
        plist.appendChild(item);
      }
      pr.appendChild(plist);
      app.appendChild(pr);

      // ---- Supporting cast ---------------------------------------------------
      const sc = el("section", "mb-8 rounded-xl border border-slate-200 bg-white p-5 shadow-sm");
      sc.appendChild(el("h2", "mb-1 text-xl font-bold text-slate-900", "Obsada drugoplanowa"));
      sc.appendChild(el("p", "mb-4 text-sm text-slate-600",
        "Skille pomocnicze wspominane w lekcjach — doradcze, poza głównym łańcuchem workflow."));
      const scGrid = el("div", "grid grid-cols-1 gap-3 sm:grid-cols-3");
      for (const item of C.supportingCast) {
        const card = el("div", "rounded-lg border border-slate-200 bg-slate-50 p-3");
        const h = el("div", "flex items-center gap-2");
        h.appendChild(el("span", "mono text-sm font-bold text-slate-900", esc(item.command)));
        h.appendChild(el("span", "mono rounded bg-slate-200 px-1 text-[11px] text-slate-600", esc(item.firstTaught)));
        card.appendChild(h);
        card.appendChild(el("p", "mt-1 text-sm text-slate-600", esc(item.description)));
        scGrid.appendChild(card);
      }
      sc.appendChild(scGrid);
      app.appendChild(sc);

      // ---- Footer ------------------------------------------------------------
      const ft = el("footer", "pb-6 pt-2 text-center text-xs text-slate-400");
      ft.innerHTML = C.skills.length + " skilli · " + C.prompts.length +
        " promptów · M0–M3 · artefakt edytorski (nie treść platformy)";
      app.appendChild(ft);
    })();
  </script>
</body>
</html>
